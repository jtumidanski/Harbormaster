# Harbormaster — example Secret.
#
# Knobs operators routinely change (top of file for visibility):
#   - HARBORMASTER_SESSION_SECRET — 64-byte random value used to sign
#                                   session cookies. If unset, Harbormaster
#                                   generates one at first boot and stores
#                                   it inside the encrypted SQLite DB on
#                                   the PVC. Provide it here if you want
#                                   stable sessions across PVC restores or
#                                   want to rotate it without re-issuing
#                                   the encryption key.
#
# Generate with:
#   openssl rand -base64 64 | tr -d '\n'
#
# Apply manually (preferred over committing a populated Secret):
#   kubectl create secret generic harbormaster-secrets \
#     --from-literal=HARBORMASTER_SESSION_SECRET="$(openssl rand -base64 64 | tr -d '\n')"
#
# Then uncomment the corresponding env entry in deployment.yaml.
#
# Note: the MinIO root credentials and per-tenant access keys are NOT
# managed via Kubernetes Secrets. They are entered through the first-run
# setup wizard and stored encrypted in the SQLite DB on the PVC.
apiVersion: v1
kind: Secret
metadata:
  name: harbormaster-secrets
  labels:
    app.kubernetes.io/name: harbormaster
type: Opaque
stringData:
  # Replace this placeholder before applying. NEVER commit a real secret.
  HARBORMASTER_SESSION_SECRET: "REPLACE_WITH_64_BYTE_RANDOM_VALUE"
