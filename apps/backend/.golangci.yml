version: "2"
run:
  go: "1.25"
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - forbidigo
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unparam
    - unused
    - whitespace
  settings:
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print(ln|f)?$
          msg: use the logger, not fmt.Print*
        - pattern: ^panic$
          msg: do not panic in production code; return an error
    gocyclo:
      min-complexity: 18
    gosec:
      excludes:
        - G115
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Tests legitimately use context-free HTTP/net constructors and helper
      # signatures whose returns aren't all consumed by every caller.
      - linters:
          - forbidigo
          - gocyclo
          - gosec
          - noctx
          - unparam
        path: _test\.go
      - linters:
          - forbidigo
        path: cmd/harbormaster/main\.go
      # Inline copy of the upstream golang-migrate sqlite driver: it mirrors
      # upstream (no request context on the database.Driver interface) and runs
      # only at startup against controlled, constant SQL.
      - linters:
          - noctx
          - gosec
        path: internal/db/sqlite_migrate_driver\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
