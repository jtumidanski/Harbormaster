# License allow-list overrides.
# Each entry MUST include: module path, license discovered, justification, reviewer, date.
ignore:
  - module: modernc.org/mathutil
    license: BSD-3-Clause
    reason: >-
      Transitive dep of modernc.org/sqlite (pure-Go driver). Ships a BSD-3-Clause
      LICENSE at its module root, but go-licenses v1.6.0's bundled classifier
      cannot match its license text. Verified BSD-3-Clause manually.
    reviewer: jtumidanski
    date: 2026-05-27
# Example:
# ignore:
#   - module: github.com/example/foo
#     license: MPL-2.0
#     reason: bundled but never linked into the runtime
#     reviewer: jtumidanski
#     date: 2026-05-23
